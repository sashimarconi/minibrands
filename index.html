  <script>
  // Fix image paths injected by client JS that reference the pub-bucket without a leading slash
  ;(function(){
    const bucket = 'pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev';
    function fixUrl(url){
      if(!url) return url;
      if(url.startsWith('http') || url.startsWith('/')) return url;
      if(url.indexOf(bucket) !== -1) return '/' + url.replace(/^\.\.?\//, '');
      return url;
    }
    function fixElement(el){
      try{
        if(el.tagName==='IMG'){
          const attr = el.getAttribute('src') || el.getAttribute('data-src') || '';
          const fixed = fixUrl(attr);
          if(fixed && el.src!==fixed) el.src = fixed;
        }
        const s = el.getAttribute && el.getAttribute('style');
        if(s && s.indexOf(bucket)!==-1){
          el.style.backgroundImage = s.replace(/url\(([^)]+)\)/g, function(m,u){
            const clean = u.replace(/^["']|["']$/g,'');
            return 'url(' + fixUrl(clean) + ')';
          });
        }
        ['data-src','data-srcset','srcset'].forEach(a=>{
          if(el.hasAttribute && el.hasAttribute(a)){
            const v = el.getAttribute(a);
            const nv = v.split(',').map(p=>p.trim().split(' ')[0]).map(p=>fixUrl(p)).join(', ');
            el.setAttribute(a,nv);
          }
        });
      }catch(e){}
    }
    function walkAndFix(root){
      root.querySelectorAll && root.querySelectorAll('img, [style], [data-src], [data-srcset], [srcset]').forEach(fixElement);
    }
    document.addEventListener('DOMContentLoaded', function(){ walkAndFix(document); });
    const mo = new MutationObserver(muts=>{
      muts.forEach(m=>{ m.addedNodes && m.addedNodes.forEach(n=>{ if(n.nodeType===1) { fixElement(n); walkAndFix(n); } }); });
    });
    mo.observe(document.documentElement || document.body, { childList: true, subtree: true });
  })();
